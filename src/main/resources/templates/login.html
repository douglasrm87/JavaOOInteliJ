<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Bancário | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0052cc;
            --primary-dark: #0747a6;
            --bg-gradient: linear-gradient(135deg, #091e42 0%, #0052cc 100%);
            --text-main: #172b4d;
            --text-light: #6b778c;
            --white: #ffffff;
            --error-bg: #fff1f0;
            --error-text: #d32f2f;
            --border: #dfe1e6;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            padding: 40px 30px 20px;
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .login-header h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .login-header p {
            color: var(--text-light);
            margin: 8px 0 0;
            font-size: 0.95rem;
        }

        .login-form {
            padding: 10px 40px 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fafbfc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 82, 204, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary-dark);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Mensagens de Alerta */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(211, 47, 47, 0.2);
        }

        /* Divisor */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-light);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider:not(:empty)::before { margin-right: .75em; }
        .divider:not(:empty)::after { margin-left: .75em; }

        /* Info Box */
        .info-box {
            background: #f4f5f7;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .info-box code {
            background: #ebecf0;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: var(--primary-dark);
        }

        @media (max-width: 400px) {
            .login-form { padding: 10px 25px 30px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <span class="logo-icon">🏦</span>
                <h1>Acesso ao Sistema</h1>
                <p>Entre com suas credenciais bancárias</p>
            </div>

            <div class="login-form">
                <div th:if="${param.error}" class="alert alert-error">
                    <span>⚠️</span> <strong>Usuário ou senha inválidos.</strong>
                </div>

                <div th:if="${param.logout}" class="alert" style="background: #e6f4ea; color: #1e7e34;">
                    <span>✅</span> <strong>Sessão encerrada com sucesso.</strong>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" placeholder="Seu nome de usuário" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit">Acessar Conta</button>
                </form>

                <div class="divider">ACESSO DE TESTE</div>

                <div class="info-box">
                    <div style="margin-bottom: 5px;">Usuário: <code>drm</code></div>
                    <div>Senha: <code>12345</code></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
